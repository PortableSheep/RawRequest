<div class="rr-app">
    <app-header></app-header>

    @if (serviceStartupError) {
        <div class="rr-service-blocking">
            <div class="glass-panel rr-service-blocking__card">
                <h2 class="rr-service-blocking__title">Service startup failed</h2>
                <p class="rr-service-blocking__message">{{ serviceStartupError }}</p>
                <p class="rr-service-blocking__hint">The UI requires the local service runtime. Fix the service and retry.</p>
                <div class="rr-service-blocking__actions">
                    <button type="button" class="rr-btn rr-btn--primary" (click)="retryServiceStartup()">
                        Retry service startup
                    </button>
                </div>
            </div>
        </div>
    }

    <main class="rr-app__main">
        <div class="rr-shell">
            <app-request-manager
                    [files]="filesSignal()"
                    [currentFileIndex]="currentFileIndexSignal()"
                    [currentEnv]="currentEnv()"
                    (filesChange)="onFilesChange($event)"
                    (currentFileIndexChange)="onCurrentFileIndexChange($event)"
                    (currentEnvChange)="onCurrentEnvChange($event)"
                    (requestExecuted)="onRequestExecuted($event)"
                    (requestProgress)="onRequestProgress($event)"
                    (historyUpdated)="onHistoryUpdated($event)">
            </app-request-manager>

            <div
                #mainSplit
                class="rr-split"
                [style.gridTemplateColumns]="splitPane.splitGridTemplateColumns"
            >
                <div class="glass-panel glass-panel--static rr-panel rr-panel--accent-blue rr-main-pane rr-main-pane--left">
                    <div class="rr-panel__header">
                        <span class="rr-panel__header-label">Editor</span>
                        <button
                            type="button"
                            class="rr-btn rr-btn--ghost"
                            (click)="openSnippetModal()"
                            title="Insert script snippet"
                        >
                            <svg xmlns="http://www.w3.org/2000/svg" class="rr-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><line x1="10" y1="9" x2="8" y2="9"/></svg>
                            <span>Snippets</span>
                        </button>
                    </div>
                    <app-editor
                        #editorComponent
                        class="rr-panel__body"
                        [content]="currentFileView().content"
                        [requests]="currentFileView().requests"
                        [variables]="currentFileView().variables"
                        [environments]="currentFileView().environments"
                        [currentEnv]="currentEnv()"
                        [secrets]="allSecrets"
                        [requestNames]="currentFileRequestNames()"
                        [executingRequestIndex]="pendingRequestIndexSignal()"
                        [isBusy]="isRequestRunningSignal()"
                        (contentChange)="onEditorContentChange($event)"
                        (requestExecute)="onRequestExecute($event)">
                    </app-editor>
                </div>

                @if (splitPane.isSplitLayout) {
                    <div
                        class="rr-split__separator"
                        (mousedown)="onSplitMouseDown($event)"
                        (dblclick)="resetSplit()"
                        title="Drag to resize (double-click to reset)"
                        role="separator"
                        aria-orientation="vertical"
                        [attr.aria-valuenow]="splitPane.editorPaneWidthPx"
                    >
                        <div class="rr-split__separator-handle">
                            <div class="rr-split__separator-line"></div>
                        </div>
                    </div>
                }

                <div class="glass-panel glass-panel--static rr-panel rr-panel--accent-emerald rr-main-pane rr-main-pane--right">
                    <app-response-panel
                        class="rr-panel__body"
                        (replayRequest)="onReplayRequest($event)">
                    </app-response-panel>
                </div>
            </div>
        </div>

        @if (activeRequestInfo; as active) {
            <app-active-request-overlay></app-active-request-overlay>
        }
    </main>

    @if (showHistoryEdgeTrigger()) {
        <button
            type="button"
            class="rr-history-edge-trigger"
            (click)="panels.toggleHistory()"
            title="Open history (⌘/Ctrl+Shift+H)"
            aria-label="Open history"
        >
            <svg xmlns="http://www.w3.org/2000/svg" class="rr-icon rr-icon--sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 8l0 4l2 2" />
                <path d="M3.05 11a9 9 0 1 1 .5 4m-.5 5v-5h5" />
            </svg>
            <span class="rr-sr-only">Open history</span>
        </button>
    }

    <app-console-drawer
            [status]="footerStatus()">
    </app-console-drawer>
    <app-history-sidebar></app-history-sidebar>
   <app-outline-panel
        (onRequestSelect)="scrollEditorToRequest($event)">
   </app-outline-panel>
   <app-command-palette
        (onRequestSelect)="scrollEditorToRequest($event)">
   </app-command-palette>
   <app-history-detail-modal
        [isOpen]="panels.showHistoryModal()"
        [item]="ws.selectedHistoryItem()"
        (onClose)="closeHistoryModal()">
    </app-history-detail-modal>
    <app-load-test-results-modal
        [isOpen]="panels.showLoadTestResults()"
        [metrics]="loadTestViz.loadTestMetrics"
        (onClose)="panels.closeLoadTestResults()">
    </app-load-test-results-modal>
    <app-donation-modal
        [isOpen]="panels.showDonationModal()"
        (onClose)="panels.showDonationModal.set(false)"
        (onDonate)="donate($event)">
    </app-donation-modal>
    <app-secrets-modal></app-secrets-modal>

    <!-- Toast Container -->
    <app-toast-container></app-toast-container>

    <!-- Update Notification -->
    <app-update-notification></app-update-notification>

    <!-- Script Snippet Modal -->
    <app-script-snippet-modal
        #snippetModal
        (snippetSelected)="onSnippetSelected($event)"
        (closed)="panels.showSnippetModal.set(false)">
    </app-script-snippet-modal>
</div>
